name: Claude Auto Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          additional_permissions: |
            actions: read
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR against the project's standards.

            Required reading before reviewing:
            - `CLAUDE.md` — project shape, anti-pattern table, code style
            - `.claude/rules/architecture.md` — three trust zones, the proposal-queue invariant, the full anti-pattern table
            - `.claude/rules/development-patterns.md` — config, logging, errors, subprocess, Pydantic, cross-language contracts
            - `.claude/rules/testing.md` — three test layers, regression-value rule, mocking discipline, 90% branch-coverage gate on units
            - `docs/ARCHITECTURE.md` — capability tiers, components, approval gates

            ## Critical anti-patterns (treat any of these as automatic CRITICAL findings — block the PR)
            1. **Proposal-queue bypass** — agent code writing to the vault, calendar, email, GitHub, or any user state directly. The only write paths from the agent container are `proposal_enqueue` (typed proposals) and `LinearClient` (for auto-applied Linear ops in the approved-class table).
            2. **Unvalidated executor input** — executor code applying a proposal without running the schema validator first.
            3. **Hardcoded user state** — vault paths, OAuth tokens, phone numbers, API keys in source. All must come from `config/*.yaml` or `.env`.
            4. **Write credentials in the agent container** — any Dockerfile/compose/env_file that puts write-scoped credentials inside the agent container.
            5. **Cross-system writes outside `00 - Assistant/`** — direct vault writes to user content without a user-approved proposal.

            ## Other anti-patterns (block-or-fix per the rule files)
            - Poll loops in agent code (`while True:` instead of event-driven wakes)
            - Silent `if not x: return` at process boundaries (must log + return)
            - Mutable default args (`def f(xs=[])`)
            - Mocking the proposal-queue invariant in tests
            - Going around `LinearClient` with raw subprocess calls
            - Bare `except:` / broad `except Exception:` swallowing
            - Magic strings for action types / Linear states / labels
            - Cross-language contracts as undocumented dicts (Pydantic ↔ Go struct ↔ TS type)
            - `print` for telemetry — use `logging.getLogger(__name__)` (Python) or `log/slog` (Go)

            ## Completeness checks
            - **Tests**: new public functions need unit coverage; bug fixes need regression tests; behavior changes need updated integration/behavioral tests where applicable
            - **Coverage**: did the diff drop branch coverage below 90% on the unit layer? (`uv run --project agent pytest agent/tests --cov=agent/src --cov-branch --cov-fail-under=90`)
            - **Cross-language drift**: if proposal schema or Linear CLI shape changed, check that all sides (Pydantic / Go / TS) and the spec doc (`docs/PROPOSAL_FORMAT.md`) updated together
            - **Config drift**: new env var or YAML key without corresponding `.env.example` / `config/*.yaml.example` update?
            - **Doc drift**: did this change affect anything documented in `docs/`? Update or flag

            ## Linear tracking (team `PA`)
            - If the PR closes an issue, verify "Closes PA-NN" is in the body
            - If the PR introduces tech debt or known bugs, verify a Linear issue is filed (or mentioned for follow-up)
            - If a referenced PA-NN's blockers haven't all merged, flag

            ## Review style
            - Use inline comments for specific code issues with concrete suggestions (file:line)
            - Prefix style/formatting items with "nit: "
            - Keep summary to 1-2 paragraphs focusing on overall assessment
            - Don't comment on things outside the diff unless they directly affect the diff's correctness
            - For revisions, verify previous comments addressed AND check new code quality
            - Reinforce good patterns when you see them — reviews that only list problems miss the chance to teach

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log"
